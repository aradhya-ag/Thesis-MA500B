project_name: "roll-rate-forecasting"
seed: 42                          
device: "auto"                    
log_level: "INFO"

# -----------------------------------------------------------------------------
# All paths may be absolute or relative to `project/`
# -----------------------------------------------------------------------------
paths:
  performance_dir: "../performance"     
  origination_dir: "../origination"     
  macro_files:
    UNRATE:     "../UNRATE.csv"         
    FEDFUNDS:   "../FEDFUNDS.csv"       
    MORTGAGE:   "../MORTGAGE30US.csv"   
    CPI:        "../CPIAUCSL.csv"       
    HPI:        "../HPIPONM226S.csv" 
  cache_dir:        "artifacts/cache"
  model_dir:        "artifacts/models"
  figure_dir:       "artifacts/figures"
  prediction_dir:   "artifacts/predictions"
  log_dir:          "artifacts/logs"

# -----------------------------------------------------------------------------
# Roll-rate construction
# -----------------------------------------------------------------------------
roll_rate:
  performance_columns:
    "0":  "loan_id"
    "1":  "period"            
    "2":  "current_upb"
    "3":  "delq_status"
    "4":  "loan_age"
    "5":  "rem_months_to_maturity"
    "10": "current_int_rate"
    "12": "ddlpi"
    "25": "eltv"
  state_map:
    "0":  0
    "1":  1
    "2":  2
    "3":  3
    "4":  4
    "5":  4
    "6":  4
    "7":  4
    "8":  4
    "9":  4
  drop_status_values: ["XX", "RA"]   
  target_from_state: 1               # 30 DPD
  target_to_state:   2               # 60 DPD
  min_source_count: 500
  series_start: "2004-01"
  series_end:   "2021-12"

# -----------------------------------------------------------------------------
# Macroeconomic variable handling.
# -----------------------------------------------------------------------------
macros:
  enabled: ["UNRATE", "FEDFUNDS", "MORTGAGE", "CPI", "HPI"]
  yoy_transform: ["CPI", "HPI"]
  publication_lag_months: 1
  adf_pvalue_threshold: 0.05

# -----------------------------------------------------------------------------
# train / validation / test split.
# -----------------------------------------------------------------------------
splits:
  train_end: "2017-12"      
  val_end:   "2019-12"      
  test_end:  "2021-12"      

# -----------------------------------------------------------------------------
# Recurrent neural models.
# -----------------------------------------------------------------------------
neural:
  variants:             
    - {name: "LSTM_no_macro",  cell: "lstm", use_macro: false}
    - {name: "LSTM_with_macro", cell: "lstm", use_macro: true}
    - {name: "GRU_no_macro",    cell: "gru",  use_macro: false}
    - {name: "GRU_with_macro",  cell: "gru",  use_macro: true}

  default_hparams:
    lookback:        12          # L, sliding-window length in months
    hidden_size:     64          # H
    num_layers:      2           # N_L
    dropout:         0.20        # p_drop (variational + final)
    learning_rate:   1.0e-3
    weight_decay:    1.0e-5
    batch_size:      32
    max_epochs:      300
    grad_clip_norm:  1.0
    patience:        30          # epochs
    lr_scheduler:    "none"
    lr_factor:       0.5
    lr_patience:     10

  seeds: [1, 42, 121, 541, 9999]

# -----------------------------------------------------------------------------
# Hyperparameter optimisation.
# -----------------------------------------------------------------------------
tuning:
  enabled: true
  n_trials: 40
  timeout_seconds: null      
  search_space:
    lookback:      {type: "int",   low: 6,  high: 24, step: 1}
    hidden_size:   {type: "categorical", choices: [16, 32, 64, 96, 128]}
    num_layers:    {type: "int",   low: 1,  high: 3}
    dropout:       {type: "float", low: 0.0, high: 0.5, step: 0.05}
    learning_rate: {type: "loguniform", low: 1.0e-4, high: 1.0e-2}
    batch_size:    {type: "categorical", choices: [16, 32, 64]}

# -----------------------------------------------------------------------------
# Evaluation.
# -----------------------------------------------------------------------------
evaluation:
  regimes:
    pre_shock:  {start: "2020-01", end: "2020-02"}
    shock:      {start: "2020-03", end: "2021-12"}